<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gali Sued - Chemistry Portfolio</title>
    
    <style>
        body {
            background-image: url('/graphene.avif'); /* Make sure your image name matches exactly! */
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333333;
            margin: 0;
            padding: 50px 20px;
            line-height: 1.6;
        }

        .profile-card {
            background-color: rgba(255, 255, 255, 0.85); 
            max-width: 800px;
            margin: 0 auto; 
            padding: 40px 50px;
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
        }

        h1, h2, h3 { color: #203a43; }
        
        h1 {
            text-align: center;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        /* I updated this part so it automatically styles standard Markdown quotes (>)! */
        blockquote {
            background-color: #f8f9fa;
            border-left: 5px solid #203a43;
            padding: 15px 25px;
            font-size: 1.1em;
            font-style: italic;
            border-radius: 0 8px 8px 0;
            margin: 0 0 20px 0;
        }

        .badge-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; margin-bottom: 30px; }
        .topic-box { border-radius: 8px; padding: 10px 20px; display: inline-block; text-align: center; font-weight: bold; color: #ffffff; }
        
        .bg-green { background-color: #4CAF50; }
        .bg-blue { background-color: #2196F3; }
        .bg-orange { background-color: #FF9800; }
        .bg-purple { background-color: #9C27B0; }
        .bg-cyan { background-color: #00BCD4; }

        ul { padding-left: 20px; }
        li { margin-bottom: 10px; }
        hr { border: 0; border-top: 1px solid #ccc; margin: 30px 0; }
        a { color: #2c5364; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="profile-card">
        {{ content }}
    </div>

</body>
</html>
